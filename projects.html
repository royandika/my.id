      --color-cream-700: oklch(0.408 0.007 89);
      --color-cream-800: oklch(0.288 0.008 89);

      --color-brand-100: oklch(0.929 0.038 60);
      --color-brand-200: oklch(0.864 0.083 55);
      --color-brand-300: oklch(0.789 0.142 51);
      --color-brand-400: oklch(0.704 0.187 43);
      --color-brand-500: oklch(0.636 0.225 36);
      --color-brand-600: oklch(0.563 0.193 36);
      --color-brand-700: oklch(0.470 0.158 38);
      --color-brand-800: oklch(0.372 0.124 39);
      --color-brand-900: oklch(0.281 0.092 39);

      --color-peach:    oklch(0.769 0.064 41);
      --color-mint:     oklch(0.786 0.063 144);
      --color-azure:    oklch(0.766 0.062 246);
      --color-lavender: oklch(0.738 0.072 297);
      --color-gold:     oklch(0.633 0.111 65);

  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<body>
  <div x-data="{
        darkMode: true,
        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          document.body.parentNode.classList.toggle('dark', this.darkMode);
        }
      }" class="min-h-dvh min-w-[320px] bg-cream-100 text-cream-900 dark:bg-cream-950 dark:text-cream-200">

    <header class="border-b border-cream-300 dark:border-white/10">
      <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-5 lg:px-10">
        <a href="https://www.royandika.my.id" class="inline-flex items-baseline gap-1 font-medium tracking-tight">royandika.my.id</a>
        <div class="flex items-center gap-2 sm:gap-5">
          <nav class="hidden items-center gap-6 md:flex">
            <a href="index.html#about" class="text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">About</a>
            <a href="index.html#experience" class="text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">Experience</a>
            <a href="projects.html" class="text-sm font-medium text-cream-900 dark:text-white">Projects</a>
            <a href="blog.html" class="text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">Blog</a>
            <a href="activities.html" class="text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">Activities</a>
            <a href="index.html#contact" class="text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">Contact</a>
          </nav>
          <button x-on:click="toggleDarkMode()" type="button"
            class="inline-flex size-9 items-center justify-center rounded-md text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white"
            aria-label="Toggle theme">
            <svg x-show="!darkMode" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
              class="inline-block size-5">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2" />
              <path d="M12 20v2" />
              <path d="m4.93 4.93 1.41 1.41" />
              <path d="m17.66 17.66 1.41 1.41" />
              <path d="M2 12h2" />
              <path d="M20 12h2" />
              <path d="m6.34 17.66-1.41 1.41" />
              <path d="m19.07 4.93-1.41 1.41" />
            </svg>
            <svg x-show="darkMode" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
              class="inline-block size-5">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
          </button>
          <a href="https://drive.google.com/file/d/11JfHK7vPqR825hJrnKMGR04B7UBXD14k/view?usp=sharing"
            class="inline-flex h-11 items-center gap-2 rounded-md bg-cream-900 px-5 text-sm font-medium text-cream-100 hover:bg-cream-800 dark:bg-white dark:text-cream-950 dark:hover:bg-white/90">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" x2="12" y1="15" y2="3" />
            </svg>
            <span class="hidden sm:inline">Download CV</span>
            <span class="sm:hidden">CV</span>
          </a>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-5 py-10 lg:px-10 lg:py-12">
      <section class="border-b border-cream-300 pb-10 dark:border-white/10">
        <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-600 dark:text-cream-500">04 · Project Archive</span>
        <h1 class="mt-4 text-4xl font-normal leading-tight tracking-[-0.02em] md:text-5xl">Project & Publikasi.</h1>
        <p class="mt-4 max-w-3xl text-sm/relaxed text-cream-700 dark:text-cream-500">
          Daftar project dan publikasi yang lebih lengkap untuk referensi.
        </p>
      </section>

      <section class="py-8">
        <div id="projects-grid" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
      </section>
    </main>

    <footer class="border-t border-cream-300 dark:border-white/10">
      <div class="mx-auto flex max-w-6xl flex-col items-start justify-between gap-3 px-5 py-8 text-sm text-cream-700 sm:flex-row sm:items-center lg:px-10 dark:text-cream-500">
        <p>CV &copy;
          <script>document.write(new Date().getFullYear());</script> · Roy Andika, M.Kom.
        </p>
        <p class="inline-flex items-center gap-1.5">Crafted with ❤️</p>
      </div>
    </footer>
  </div>

  <script src="data/projects.js"></script>
  <script>
    (function () {
      const ARROW_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="size-3.5 transition-transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5">
        <path d="M7 7h10v10"/><path d="M7 17 17 7"/>
      </svg>`;

      function buildCard(p) {
        const num = String(p.id).padStart(2, "0");
        return `
          <article class="group flex flex-col rounded-xl border border-cream-300 bg-white p-6 dark:border-white/10 dark:bg-white/5">
            <div class="flex items-center justify-between gap-3">
              <span class="inline-flex items-center gap-1.5 rounded-full bg-${p.tagColor}/25 px-2.5 py-1 text-xs font-semibold uppercase tracking-tight text-cream-900 dark:text-cream-100">
                ${p.tags}
              </span>
              <span class="font-mono text-xs text-cream-600 dark:text-cream-500">${num}</span>
            </div>
            <h2 class="mt-5 text-[1.25rem] font-normal leading-snug tracking-tight md:text-[1.375rem]">${p.title}</h2>
            <p class="mt-3 flex-1 text-sm/relaxed text-cream-700 dark:text-cream-500">${p.desc}</p>
            <a href="${p.linkUrl}" target="_blank" rel="noopener"
               class="mt-5 inline-flex items-center gap-2 font-mono text-xs text-cream-900 underline decoration-cream-400 underline-offset-4 hover:decoration-cream-900 dark:text-white dark:decoration-white/30 dark:hover:decoration-white">
              ${p.linkLabel}
              ${ARROW_SVG}
            </a>
          </article>`;
      }

      const grid = document.getElementById("projects-grid");
      if (typeof PROJECTS !== "undefined" && grid) {
        grid.innerHTML = PROJECTS.map(buildCard).join("");
      }
    })();
  </script>
</body>
</html>
